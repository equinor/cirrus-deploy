site_name: Karsk
site_description: Tool for building and deploying software on HPC clusters
repo_url: https://github.com/equinor/karsk

docs_dir: docs
site_dir: site

nav:
  - Home: index.md
  - API Reference:
    - karsk.config: api/config.md

theme:
  name: material

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: .  # relative to project root

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            extensions:
              - griffe_pydantic
