# yaml-language-server: $schema=https://equinor.github.io/karsk/schema.json

destination: /prog/cirrus
main-package: runcirrus
entrypoints:
  - bin/runcirrus
build-image: ./Containerfile

packages:
  - name: runcirrus
    version: 1.0.0
    src:
      type: git
      url: https://github.com/equinor/runcirrus.git
      ref: 757559903905fd7bc0725c69382ca24efd53ade4

    build: |
      python3.11 -m venv $out
      $out/bin/pip install $src
